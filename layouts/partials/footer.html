<footer class="site-footer">
  <div class="container">
    <span>{{ with .Site.Params.footer.left }}{{ . | markdownify }}{{ else }}&copy; {{ now.Year }} {{ $.Site.Title }}{{ end }}</span>
    <span>{{ with .Site.Params.footer.right }}{{ . | markdownify }}{{ else }}{{ i18n "builtWith" | default "Built with Hugo" }} — {{ $.Site.Params.author | default $.Site.Title }}{{ end }}</span>
  </div>
</footer>

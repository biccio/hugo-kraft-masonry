{{- $cfg := .Site.Params.echothread -}}
{{- $apiKey := os.Getenv "ECHOTHREAD_API_KEY" -}}
{{- if and $cfg $cfg.shortname $apiKey -}}
{{- $id := .Permalink -}}
{{- with .File }}{{- $id = .UniqueID -}}{{- end -}}
<section class="post-comments">
  <div id="echothread"
       data-shortname="{{ $cfg.shortname }}"
       data-api-key="{{ $apiKey }}"
       data-page-url="{{ .Permalink }}"
       data-identifier="{{ $id }}"
       data-page-title="{{ .Title }}"
       data-lang="{{ .Language.Lang }}"
       {{- with $cfg.theme }} data-theme="{{ . }}"{{ end -}}
       {{- with $cfg.accentColor }} data-accent-color="{{ . }}"{{ end -}}></div>
  <script src="https://cdn.echothread.io/widget.js" async></script>
</section>
{{- end -}}

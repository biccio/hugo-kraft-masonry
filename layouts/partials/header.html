<header class="site-header">
  <div class="container">
    <a class="site-logo" href="{{ "/" | relLangURL }}">{{ .Site.Title }}</a>

    <div class="site-header-actions">
      {{ $menu := .Site.Menus.main }}
      {{ if $menu }}
        <nav class="site-nav" aria-label="{{ i18n "mainNav" | default "Main menu" }}">
          <ul>
            {{ range $menu }}
              <li><a href="{{ .URL | absURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
            {{ end }}
          </ul>
        </nav>
      {{ end }}

      <button type="button" class="theme-toggle" data-theme-toggle aria-label="{{ i18n "toggleTheme" | default "Toggle light/dark theme" }}">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </div>
</header>

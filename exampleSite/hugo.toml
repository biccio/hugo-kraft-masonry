baseURL = "https://example.com/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "Kraft Masonry"
theme = "hugo-kraft-masonry"

disablePathToLower = false

[taxonomies]
  category = "categories"
  tag      = "tags"

[params]
  description = "A demo site for the Kraft Masonry Hugo theme — travel, technology, and everyday life."
  author      = "Jane Doe"

  mainSections       = ["posts"]
  homepagePostLimit  = 12
  enableCategoryFilter = true

  # Visible post-date format, rendered with Hugo's locale-aware time.Format.
  # Predefined tokens: ":date_full", ":date_long" (default), ":date_medium",
  # ":date_short". Or a custom Go layout, e.g. "02/01/2006" → 19/06/2026
  # (numeric, day-first). Month/weekday names are localized to the page language.
  # dateFormat = ":date_long"

  # Social sharing — optional
  # ogImage       = "/img/og-default.png"  # fallback OG image (e.g. for homepage and posts without a cover)
  # twitterHandle = "yourhandle"           # without the @ sign

  # Google Analytics (GA4) — optional, loaded only in production builds
  # googleAnalytics = "G-XXXXXXXXXX"

  # EchoThread comments — optional; widget is not rendered if shortname or
  # the ECHOTHREAD_API_KEY env var are absent.
  # [params.echothread]
  #   shortname   = "yourshortname" # from echothread.io dashboard (required)
  #   theme       = "auto"          # auto | light | dark  (default: auto)
  #   accentColor = ""              # optional hex accent, e.g. "#2f5d50"
  # Set API key via environment variable (never put it in hugo.toml):
  #   export ECHOTHREAD_API_KEY="your-api-key"

  [params.footer]
    left  = "&copy; 2026 Kraft Masonry"
    right = "Built with [Hugo](https://gohugo.io) &amp; **Kraft Masonry**"

  [params.hero]
    title    = "Kraft Masonry"
    subtitle = [
      "A **minimal** Hugo theme for personal blogs.",
      "Masonry grid · Category filter · Tags · Light & dark mode.",
      "Free and open source — [MIT licence](https://github.com/YOUR_USERNAME/hugo-kraft-masonry/blob/main/LICENSE)."
    ]

[menus]
  [[menus.main]]
    name   = "Posts"
    url    = "/posts/"
    weight = 10

  [[menus.main]]
    name   = "Categories"
    url    = "/categories/"
    weight = 20

  [[menus.main]]
    name   = "Tags"
    url    = "/tags/"
    weight = 25

  [[menus.main]]
    name   = "About"
    url    = "/about/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

baseURL = "https://example.com/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "Kraft Masonry"
theme = "hugo-kraft-masonry"

disablePathToLower = false

[taxonomies]
  category = "categories"
  tag      = "tags"

[params]
  description = "A demo site for the Kraft Masonry Hugo theme — travel, technology, and everyday life."
  author      = "Jane Doe"

  mainSections       = ["posts"]
  homepagePostLimit  = 12
  enableCategoryFilter = true

  # Visible post-date format, rendered with Hugo's locale-aware time.Format.
  # Predefined tokens: ":date_full", ":date_long" (default), ":date_medium",
  # ":date_short". Or a custom Go layout, e.g. "02/01/2006" → 19/06/2026
  # (numeric, day-first). Month/weekday names are localized to the page language.
  # dateFormat = ":date_long"

  # Social sharing — optional
  # ogImage       = "/img/og-default.png"  # fallback OG image (e.g. for homepage and posts without a cover)
  # twitterHandle = "yourhandle"           # without the @ sign

  # Google Analytics (GA4) — optional, loaded only in production builds
  # googleAnalytics = "G-XXXXXXXXXX"

  # EchoThread comments — optional; widget is not rendered if apiKey is absent
  # [params.echothread]
  #   apiKey      = "YOUR_API_KEY"   # from echothread.io dashboard (required)
  #   shortname   = "yourshortname"  # your EchoThread shortname (required)
  #   theme       = "auto"           # auto | light | dark  (default: auto)
  #   accentColor = ""               # optional hex accent, e.g. "#2f5d50"

  # Person structured data (JSON-LD) for the homepage — optional.
  # When present, a <script type="application/ld+json"> block with @type Person
  # is emitted in the <head> of the homepage only. All fields are optional.
  # [params.person_ld]
  #   person_name            = "John Doe"
  #   person_family_name     = "Doe"
  #   person_given_name      = "John"
  #   person_image           = "https://example.org/john_doe.webp"
  #   person_telephone       = "+491231234567"
  #   person_email           = "john.doe@example.org"
  #   person_url             = "https://john_doe.example.org/"
  #   person_vatid           = "DE123456789"
  #   person_knows_language  = ["de-DE", "en-US"]
  #   address_street         = "Am Hauptbahnhof"
  #   address_postal_code    = "60329"
  #   address_locality       = "Frankfurt am Main"
  #   address_region         = "Hesse"
  #   address_country        = "DE"

  [params.footer]
    left  = "&copy; 2026 Kraft Masonry"
    right = "Built with [Hugo](https://gohugo.io) &amp; **Kraft Masonry**"

  [params.hero]
    title    = "Kraft Masonry"
    subtitle = [
      "A **minimal** Hugo theme for personal blogs.",
      "Masonry grid · Category filter · Tags · Light & dark mode.",
      "Free and open source — [MIT licence](https://github.com/YOUR_USERNAME/hugo-kraft-masonry/blob/main/LICENSE)."
    ]

[menus]
  [[menus.main]]
    name   = "Posts"
    url    = "/posts/"
    weight = 10

  [[menus.main]]
    name   = "Categories"
    url    = "/categories/"
    weight = 20

  [[menus.main]]
    name   = "Tags"
    url    = "/tags/"
    weight = 25

  [[menus.main]]
    name   = "About"
    url    = "/about/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
